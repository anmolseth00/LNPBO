site_name: LNPBO
site_description: Bayesian Optimization for LNP Formulation Design
site_url: https://anmolseth00.github.io/LNPBO
repo_url: https://github.com/anmolseth00/LNPBO
repo_name: anmolseth00/LNPBO

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: guide/quickstart.md
      - Molecular Encodings: guide/encodings.md
      - Optimization Strategies: guide/strategies.md
      - Surrogate Models: surrogates.md
      - CLI Reference: guide/cli.md
  - API Reference:
      - Optimization: api/optimization.md
      - Data: api/data.md
      - Benchmarks: api/benchmarks.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            summary: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anmolseth00/LNPBO
