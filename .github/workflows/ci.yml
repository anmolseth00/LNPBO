name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies (GP + dev extras)
        # The GP extra pulls torch/gpytorch/botorch (exercised by the bulk of the
        # suite); dev pulls ruff + pytest. xgboost is a core dependency. The
        # chemprop/LiON tests are import-gated and skipped here.
        run: uv sync --extra gp --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run python -m pytest tests/ -q
